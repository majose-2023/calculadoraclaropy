<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Planes</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <h1>Calculadora de Planes</h1>
</header>

<nav class="menu">
    <button data-categoria="internet">Internet</button>
    <button data-categoria="pospago">Pospago</button>
    <button data-categoria="tv">Claro TV</button>
    <button data-categoria="combos">Combos</button>
</nav>

<main>

    <section id="planes" class="planes"></section>

    <section class="resumen">

        <h2>Resumen</h2>

        <!-- 🔥 NUEVO CONTENEDOR (IMPORTANTE PARA MOBILE FIX) -->
        <div class="resumen-content">

            <div id="seleccionados"></div>

            <h3>
                Total:
                <span id="total">₲0</span>
            </h3>

        </div>

        <button id="whatsapp">
            Solicitar por WhatsApp
        </button>

    </section>

</main>

<script src="js/data.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
